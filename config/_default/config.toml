baseURL = 'https://suzano.github.io'
languageCode = "pt"
#languageCode = "en"
DefaultContentLanguage = "pt"
#DefaultContentLanguage = "en"
title = "Website do Suziboy"
#title = "Website of Suziboy"
theme = "anatole"
summarylength = 10
enableEmoji = true
enableRobotsTXT = true

# Enable Disqus
#disqusShortname = ""

# Google Analytics
#googleAnalytics = "UA-123-45"

# Syntax highlighting
pygmentsUseClasses = true   
pygmentsCodeFences = true
pygmentsCodefencesGuessSyntax = true

[markup]
    [markup.goldmark]
        [markup.goldmark.renderer]
        unsafe=true

[taxonomies]
    category = "categories"
    series = "series"
    tag = "tags"
